name: Deploy to Vercel

on:
  push:
    branches:
      - develop   # → Vercel Preview (staging)
      - main      # → Vercel Production

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false      # never cancel an in-flight deploy

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}   # prj_dTzZt7S3vG8U3nKS5ZuvTVZ7WBTz

jobs:
  # ─────────────────────────────────────────────────────────────
  # PREVIEW — runs on pushes to `develop`
  # ─────────────────────────────────────────────────────────────
  deploy-preview:
    name: Deploy → Preview (staging)
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.url }}

    if: github.ref_name == 'develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'preview')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to preview: $URL"

      - name: Comment preview URL on linked PRs
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            const sha  = context.sha;
            const prs  = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: sha,
            });
            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner:    context.repo.owner,
                repo:     context.repo.repo,
                issue_number: pr.number,
                body: `## Preview Deployment\n\n✅ Successfully deployed to Vercel Preview:\n\n**URL:** ${url}\n\n> Commit: \`${sha.slice(0,7)}\``,
              });
            }

  # ─────────────────────────────────────────────────────────────
  # PRODUCTION — runs on pushes to `main`
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy-prod.outputs.url }}

    if: github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel Production
        id: deploy-prod
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to production: $URL"

      - name: Create GitHub Release tag
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const date = new Date().toISOString().slice(0,10).replace(/-/g,'.');
            const tag  = `release-${date}-${sha.slice(0,7)}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `refs/tags/${tag}`,
                sha:   sha,
              });
              console.log(`Tagged: ${tag}`);
            } catch (e) {
              console.log(`Tag skipped (may exist): ${e.message}`);
            }

      - name: Notify — production deploy summary
        run: |
          echo "### Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.deploy-prod.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
